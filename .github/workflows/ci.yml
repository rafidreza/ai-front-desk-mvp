name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    env:
      # Placeholder so prisma.config.ts can resolve env('DATABASE_URL') during
      # `prisma generate`. Generate only reads the schema; it does NOT connect.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w @ai-front-desk/api
      - run: npm run lint
      - run: npm run build
      - run: npm run build:web
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
